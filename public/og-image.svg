<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0046C8"/>
      <stop offset="50%" style="stop-color:#002E8A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A8FE7"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="180" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="550" r="250" fill="rgba(255,255,255,0.02)"/>
  <circle cx="900" cy="500" r="120" fill="rgba(255,255,255,0.04)"/>

  <!-- Decorative dots -->
  <circle cx="200" cy="150" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="350" cy="100" r="3" fill="rgba(255,255,255,0.1)"/>
  <circle cx="800" cy="180" r="5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1000" cy="350" r="3" fill="rgba(255,255,255,0.1)"/>
  <circle cx="400" cy="500" r="4" fill="rgba(255,255,255,0.08)"/>

  <!-- Logo icon -->
  <rect x="100" y="190" width="72" height="72" rx="14" fill="url(#accent)" opacity="0.9"/>
  <text x="136" y="220" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">Career</text>
  <text x="136" y="244" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle">Navigator</text>

  <!-- Title -->
  <text x="190" y="240" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="white">Career Navigator</text>

  <!-- Subtitle -->
  <text x="102" y="310" font-family="'Noto Sans KR', sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.8)">직업학박사와 함께하는 커리어 상담 플랫폼</text>

  <!-- Divider line -->
  <rect x="102" y="340" width="80" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Features -->
  <text x="102" y="390" font-family="'Noto Sans KR', sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)">진로상담 · 이력서 진단 · 커리어 컨설팅 · 모의면접 · 온라인 강의</text>

  <!-- Stats row -->
  <text x="102" y="480" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="800" fill="white">50+</text>
  <text x="102" y="510" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.5)">전문 멘토</text>

  <text x="262" y="480" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="800" fill="white">3,000+</text>
  <text x="262" y="510" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.5)">상담 완료</text>

  <text x="462" y="480" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="800" fill="white">4.9</text>
  <text x="462" y="510" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.5)">평균 평점</text>

  <!-- Right side illustration - abstract mentor card -->
  <g transform="translate(850, 160)">
    <rect x="0" y="0" width="240" height="310" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="120" cy="90" r="45" fill="rgba(255,255,255,0.12)"/>
    <circle cx="120" cy="75" r="22" fill="rgba(255,255,255,0.2)"/>
    <ellipse cx="120" cy="115" rx="30" ry="18" fill="rgba(255,255,255,0.2)"/>
    <rect x="60" y="155" width="120" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="80" y="180" width="80" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="75" y="220" font-size="18" fill="#F59E0B">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
    <rect x="40" y="250" width="160" height="36" rx="8" fill="url(#accent)" opacity="0.8"/>
    <text x="120" y="275" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">상담 예약하기</text>
  </g>
</svg>
